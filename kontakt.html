          <h2>Kontaktformular</h2>
   
 
    <p>Haben Sie Fragen zu unseren Retreats? Wir beraten Sie gerne persönlich. Felder mit * sind Pflichtfelder.</p>
 
    <form action="#" method="post">
      <fieldset>
        <legend>Deine Nachricht</legend>
 
        <p>
          <label for="name">Name *</label><br>
          <input id="name" name="name" type="text" required>
        </p>
 
        <p>
          <label for="email">E-Mail *</label><br>
          <input id="email" name="email" type="email" required>
        </p>
 
        <p>
          <label for="topic">Thema</label><br>
          <select id="topic" name="topic">
            <option value="frage">Anmeldung zum Retreat</option>
            <option value="feedback">Frage zur Unterkunft</option>
            <option value="Kooperation">Individuelle Beratung</option>
          </select>
        </p>
 
        <p>
          <label for="message">Nachricht *</label><br>
          <textarea id="message" name="message" rows="6" required></textarea>
        </p>
 
        <p>
          <button type="submit">Senden</button>
          <button type="reset">Zurücksetzen</button>
        </p>
      </fieldset>
    </form>
  </main>
